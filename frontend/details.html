<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="MAITRI Wellness Dashboard" />
  <title>MAITRI - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="neural-bg" class="neural-container"></div>
  <div class="app">
    <header class="app-header">
      <a class="brand" href="index.html" style="text-decoration:none; color:inherit; cursor:pointer;" title="Back to MAITRI">
        <span class="brand-title">MAITRI</span>
        <span class="brand-subtitle">Wellness Dashboard</span>
      </a>
      <div class="status-row">
        <button class="ghost-button" id="toggle-theme" type="button">Light mode</button>
        <button class="ghost-button" onclick="window.location.href='index.html'">Back to Chat</button>
      </div>
    </header>
    
    <div class="dashboard-shell" style="margin-top: 30px;">
      <div class="dashboard-hero">
        <div>
          <h2 style="margin-top:0">Your Wellness Overview</h2>
          <p class="section-subtitle">A summary of your emotional trends and activities</p>
        </div>
      </div>
      
      <div class="dashboard-grid">
        <section class="dashboard-section">
          <h3 class="section-title">Emotion History</h3>
          <p class="section-subtitle">Your detected moods over time</p>
          <div class="chart-container" style="height: 300px; margin-top: 16px;">
            <canvas id="emotionChart"></canvas>
          </div>
        </section>
        
        <div style="display: flex; flex-direction: column; gap: 20px;">
          <section class="dashboard-section">
            <h3 class="section-title">Recent Reports</h3>
            <div id="reports-list" class="journal-list" style="margin-top: 16px;">Loading...</div>
          </section>
          
          <section class="dashboard-section">
            <h3 class="section-title">Meditation Sessions</h3>
            <div id="meditation-list" class="session-list" style="margin-top: 16px;">Loading...</div>
          </section>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/flow-field-background.js"></script>
  <script>
    const container = document.getElementById("neural-bg");
    if (container) {
      const readVar = (name) => getComputedStyle(document.body).getPropertyValue(name).trim();
      const buildConfig = () => ({
        color: readVar("--neural-color") || "#e47f63",
        trailColor: readVar("--neural-trail") || "0, 0, 0",
        trailOpacity: 0.08,
        particleCount: 520,
        speed: 0.7
      });
      window.neuralBackground = new NeuralBackground(container, buildConfig());
      window.updateNeuralBackground = () => {
        if (window.neuralBackground) {
          window.neuralBackground.setPalette(buildConfig());
        }
      };
    }
  </script>
  <script type="module" src="js/details.js"></script>
</body>
</html>
