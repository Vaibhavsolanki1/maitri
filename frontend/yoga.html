<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="MAITRI Yoga Flow — AI-powered guided pose training" />
  <title>MAITRI — Yoga Flow</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ─── YOGA PAGE OVERRIDES ───────────────────────────────────────── */
    :root {
      --yoga-accent:   #e47f63;
      --yoga-green:    #6c8c7b;
      --yoga-amber:    #e9b478;
    }
    body[data-theme="dark"] {
      --yoga-accent:   #d47b5e;
      --yoga-green:    #7ba28d;
      --yoga-amber:    #e0b07b;
    }

    /* Full-page wrapper — mirrors .app from dashboard */
    .yoga-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 40px;
      position: relative;
      isolation: isolate;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .yoga-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .yoga-brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      text-decoration: none;
    }
    .yoga-brand:hover .brand-title { color: var(--yoga-accent); }
    .yoga-brand .brand-title {
      font-family: "Fraunces", "Georgia", serif;
      font-size: 32px;
      letter-spacing: 0.6px;
      color: var(--text);
      transition: color 0.2s ease;
    }
    .yoga-brand .brand-subtitle {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .yoga-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ── Hero ────────────────────────────────────────────────────────── */
    .yoga-hero {
      text-align: center;
      padding: 2rem 0 3rem;
    }
    .yoga-hero h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--text);
      margin: 0 0 0.75rem;
      letter-spacing: -0.5px;
    }
    .yoga-hero h1 span { color: var(--yoga-accent); }
    .yoga-hero p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Pose Category Columns ──────────────────────────────────────── */
    .pose-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) { .pose-grid { grid-template-columns: 1fr; } }

    /* ── Category Panel — matches .panel from dashboard ─────────────── */
    .pose-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.7s ease both;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pose-panel:nth-child(2) { animation-delay: 0.1s; }
    .pose-panel:nth-child(3) { animation-delay: 0.2s; }

    .pose-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .pose-panel-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    /* ── Pose Rows ───────────────────────────────────────────────────── */
    .pose-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .pose-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      width: 100%;
      color: var(--text);
      font-family: inherit;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
    }
    .pose-row:hover {
      background: var(--action-card-bg);
      border-color: rgba(228, 127, 99, 0.22);
      transform: translateX(4px);
      box-shadow: var(--shadow-soft);
    }

    /* Icon box — matches .action-icon */
    .pose-icon {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--action-icon-bg);
      display: grid;
      place-items: center;
    }
    .pose-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--yoga-accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pose-info { flex: 1; min-width: 0; }
    .pose-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pose-sanskrit {
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-top: 2px;
      font-style: italic;
    }

    .pose-arrow {
      flex-shrink: 0;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .pose-row:hover .pose-arrow { opacity: 1; transform: translateX(3px); }
    .pose-arrow svg {
      width: 16px; height: 16px;
      stroke: var(--yoga-accent);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Session Overlay ─────────────────────────────────────────────── */
    .session-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, var(--bg-spot) 0%, var(--bg) 45%, var(--bg-2) 100%);
      z-index: 1000;
      flex-direction: column;
    }
    .session-overlay.active { display: flex; }

    .session-inner {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      padding: 20px;
      height: 100%;
      min-height: 0;
    }
    @media (max-width: 900px) {
      .session-inner { grid-template-columns: 1fr; }
    }

    /* Video area */
    .session-video-wrap {
      position: relative;
      background: var(--panel);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-strong);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #yoga-video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #yoga-canvas, #ghost-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #yoga-canvas  { z-index: 2; }
    #ghost-canvas { z-index: 3; }

    /* HUD elements */
    .session-hud {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      pointer-events: none;
      z-index: 4;
    }
    .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .hud-pose-name {
      font-family: "Fraunces", serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--yoga-accent);
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .hud-accuracy {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .accuracy-circle {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 3px solid var(--yoga-green);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700;
      background: var(--panel);
      box-shadow: var(--shadow-pill);
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      font-family: "Fraunces", serif;
    }
    .accuracy-circle.high {
      border-color: var(--yoga-accent);
      background: rgba(228, 127, 99, 0.1);
      box-shadow: 0 0 24px rgba(228, 127, 99, 0.3);
    }
    .accuracy-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hud-feedback-bar {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 1rem;
      color: #fff;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.12);
      transition: border-color 0.3s;
    }
    .hud-feedback-bar.success { border-color: rgba(100, 220, 130, 0.5); }
    .hud-feedback-bar.warning { border-color: rgba(228, 127, 99, 0.5); }

    /* Side Panel */
    .session-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    .sp-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .sp-title {
      font-family: "Fraunces", serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--yoga-accent);
    }
    .sp-desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .sp-sep { border: none; border-top: 1px solid var(--panel-border); margin: 0; }

    /* Step list */
    .step-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 6px;
    }
    .step-item {
      font-size: 0.88rem;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      position: relative;
      padding-left: 24px;
    }
    .step-item::before {
      content: '';
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s;
    }
    .step-item.active {
      color: var(--text);
      background: rgba(228, 127, 99, 0.08);
      border-color: rgba(228, 127, 99, 0.2);
    }
    .step-item.active::before { background: var(--yoga-accent); }
    .step-item.done { text-decoration: line-through; opacity: 0.5; }
    .step-item.done::before { background: var(--yoga-green); }

    /* Hold timer */
    .hold-wrap {
      display: flex; align-items: center; gap: 16px;
    }
    .hold-timer {
      font-family: "Fraunces", serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--yoga-accent);
      min-width: 64px;
      text-align: center;
    }
    .hold-bar-track {
      flex: 1;
      height: 6px;
      background: var(--panel-soft-border);
      border-radius: 99px;
      overflow: hidden;
    }
    .hold-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--yoga-green), var(--yoga-accent));
      border-radius: 99px;
      transition: width 0.8s linear;
    }

    /* Buttons in session panel */
    .sp-actions { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
  </style>
</head>
<body>
  <!-- Neural background — identical to dashboard -->
  <div id="neural-bg" class="neural-container"></div>

  <div class="yoga-page">
    <!-- Header — matches app-header exactly -->
    <header class="yoga-header">
      <a class="yoga-brand" href="index.html" id="yoga-brand-link" title="Back to MAITRI Dashboard">
        <span class="brand-title">MAITRI</span>
        <span class="brand-subtitle">Yoga Flow</span>
      </a>
      <div class="yoga-nav">
        <div class="status-chip" id="status-text">Initializing MoveNet…</div>
        <button class="ghost-button" id="toggle-theme" type="button">Light mode</button>
        <button class="ghost-button" type="button" onclick="window.location.href='index.html'">← Dashboard</button>
      </div>
    </header>

    <!-- Hero -->
    <section class="yoga-hero">
      <h1>AI-Guided <span>Yoga Training</span></h1>
      <p>Select a pose. Align with the ghost outline. Hold to advance through each step — powered by MoveNet Thunder.</p>
    </section>

    <!-- Pose grid — 3 columns, one per difficulty -->
    <div class="pose-grid" id="pose-grid">
      <!-- Dynamically populated by yoga.js -->
    </div>
  </div>

  <!-- ═══ SESSION OVERLAY ═══════════════════════════════════════════ -->
  <div class="session-overlay" id="session-overlay">
    <!-- Session header strip -->
    <header class="yoga-header" style="padding: 12px 20px; margin-bottom: 0; border-bottom: 1px solid var(--panel-border); background: var(--panel);">
      <a class="yoga-brand" href="index.html" style="gap: 4px;">
        <span class="brand-title" style="font-size: 22px;">MAITRI</span>
        <span class="brand-subtitle" style="font-size: 11px;">Yoga Flow</span>
      </a>
      <div class="yoga-nav">
        <div class="status-chip" id="session-status-text">Session active</div>
      </div>
    </header>

    <div class="session-inner">
      <!-- Video / canvas area -->
      <div class="session-video-wrap">
        <video id="yoga-video" autoplay playsinline muted></video>
        <canvas id="yoga-canvas"></canvas>
        <canvas id="ghost-canvas"></canvas>

        <div class="session-hud">
          <div class="hud-top">
            <div class="hud-pose-name" id="hud-pose-name">—</div>
            <div class="hud-accuracy">
              <div class="accuracy-circle" id="accuracy-circle">
                <span id="accuracy-percent">0%</span>
              </div>
              <div class="accuracy-label">Match</div>
            </div>
          </div>
          <div class="hud-feedback-bar" id="hud-feedback" style="display:none;"></div>
        </div>
      </div>

      <!-- Side panel -->
      <div class="session-panel">
        <div>
          <div class="sp-label">Current Step</div>
          <div class="sp-title" id="step-title">Step 1</div>
          <div class="sp-desc" id="step-description"></div>
        </div>

        <hr class="sp-sep" />

        <div>
          <div class="sp-label">Progress</div>
          <ol class="step-list" id="instruction-list"></ol>
        </div>

        <hr class="sp-sep" />

        <div>
          <div class="sp-label">Hold Timer</div>
          <div class="hold-wrap">
            <div class="hold-timer" id="timer-display">—</div>
            <div class="hold-bar-track">
              <div class="hold-bar-fill" id="hold-bar-fill"></div>
            </div>
          </div>
        </div>

        <div class="sp-actions">
          <button class="primary-button" id="next-step-btn" onclick="yogaSession.nextStep()">Skip Step</button>
          <button class="ghost-button" onclick="yogaSession.endSession()">End Session</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Neural background init — same script as index.html -->
  <script src="js/flow-field-background.js"></script>
  <script>
    const yogaBgEl = document.getElementById("neural-bg");
    if (yogaBgEl) {
      const readVar = name => getComputedStyle(document.body).getPropertyValue(name).trim();
      const buildConfig = () => ({
        color: readVar("--neural-color") || "#e47f63",
        trailColor: readVar("--neural-trail") || "246,239,232",
        trailOpacity: 0.08,
        particleCount: 520,
        speed: 0.7
      });
      window.neuralBackground = new NeuralBackground(yogaBgEl, buildConfig());
      window.updateNeuralBackground = () => {
        if (window.neuralBackground) window.neuralBackground.setPalette(buildConfig());
      };
    }
  </script>

  <!-- TensorFlow / MoveNet -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <!-- Yoga controller (module) -->
  <script type="module" src="js/yoga.js"></script>
</body>
</html>
