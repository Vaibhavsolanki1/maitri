<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MAITRI - Yoga Flow</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    .yoga-container { padding: 40px; text-align: center; }
    .pose-cards { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
    .pose-card { background: var(--panel); border: 1px solid var(--panel-border); padding: 30px; border-radius: var(--radius); cursor: pointer; transition: transform 0.2s; min-width: 250px; box-shadow: var(--shadow); }
    .pose-card:hover { transform: translateY(-5px); }
    .camera-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; }
    .camera-overlay.is-active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .camera-overlay video, .camera-overlay canvas { position: absolute; max-width: 100%; max-height: 100%; }
    .overlay-ui { position: absolute; top: 20px; left: 20px; z-index: 1001; color: white; text-align: left; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 16px; backdrop-filter: blur(10px); }
    .overlay-ui h2 { margin: 0 0 10px 0; }
    .overlay-ui h1 { margin: 10px 0 0 0; font-size: 48px; color: var(--accent); }
    .close-yoga { position: absolute; top: 20px; right: 20px; z-index: 1001; }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-title">MAITRI</span>
        <span class="brand-subtitle">Yoga Flow</span>
      </div>
      <button class="ghost-button" onclick="window.location.href='index.html'">Back to Chat</button>
    </header>
    <main class="yoga-container">
      <h2>Select a pose to begin</h2>
      <div id="status" class="status-chip">Loading MoveNet...</div>
      <div class="pose-cards">
        <div class="pose-card" data-pose="mountain">
          <h3>Mountain Pose</h3>
          <p>Wrists above nose</p>
        </div>
        <div class="pose-card" data-pose="tree">
          <h3>Tree Pose</h3>
          <p>Ankle near knee, arms up</p>
        </div>
        <div class="pose-card" data-pose="warrior2">
          <h3>Warrior II</h3>
          <p>Arms horizontal, lunge</p>
        </div>
      </div>
    </main>
  </div>

  <div class="camera-overlay" id="yoga-camera-overlay">
    <video id="yoga-video" autoplay playsinline muted></video>
    <canvas id="yoga-canvas"></canvas>
    <div class="overlay-ui">
      <h2 id="current-pose-name">Pose</h2>
      <p id="pose-feedback">Stand in position</p>
      <h1 id="pose-timer">10</h1>
    </div>
    <button class="ghost-button close-yoga" id="close-yoga">End Session</button>
  </div>

  <script src="js/yoga.js"></script>
</body>
</html>
