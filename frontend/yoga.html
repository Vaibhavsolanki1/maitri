<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAITRI - AI Yoga Trainer</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* YOGA-SPECIFIC OVERRIDES - USE MAITRI PALETTE */
    :root {
      --yoga-primary: #e47f63;
      --yoga-secondary: #6c8c7b;
      --yoga-tertiary: #e9b478;
    }

    body[data-theme="dark"] {
      --yoga-primary: #d47b5e;
      --yoga-secondary: #7ba28d;
      --yoga-tertiary: #e0b07b;
    }

    /* Light mode background */
    body[data-theme="light"] {
      background: #ffffff !important;
    }

    body[data-theme="light"] #yoga-bg {
      background: #ffffff !important;
    }

    /* Dark mode background */
    body[data-theme="dark"] {
      background: #000000 !important;
    }

    body[data-theme="dark"] #yoga-bg {
      background: #000000 !important;
    }

    #yoga-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .yoga-app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .yoga-header {
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-soft);
    }

    .yoga-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--yoga-primary);
      font-family: "Fraunces", serif;
    }

    .yoga-nav {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: var(--chip-bg);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      font-size: 0.9rem;
      color: var(--chip-text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--yoga-secondary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .yoga-container {
      flex: 1;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .pose-categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .category-section {
      background: var(--yoga-primary);
      color: #1b1714;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 2rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: var(--shadow-soft);
    }

    .category-section:hover {
      border-color: var(--yoga-primary);
      box-shadow: var(--shadow-soft-md);
      transform: translateY(-2px);
    }

    .category-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #1b1714;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .pose-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .pose-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--panel-soft-border);
    }

    .pose-item:last-child {
      border-bottom: none;
    }

    .pose-button {
      background: none;
      border: none;
      padding: 0.75rem 0;
      width: 100%;
      text-align: left;
      color: var(--yoga-secondary);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
      position: relative;
      font-family: "Manrope", sans-serif;
    }

    .pose-button:hover {
      color: var(--yoga-primary);
      transform: translateX(5px);
    }

    .pose-button::before {
      content: '';
      position: absolute;
      left: -10px;
      width: 3px;
      height: 100%;
      background: var(--yoga-primary);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .pose-button:hover::before {
      opacity: 1;
    }

    /* SESSION OVERLAY */
    .yoga-session-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, var(--bg-spot) 0%, var(--bg) 45%, var(--bg-2) 100%);
      z-index: 1000;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }

    .yoga-session-overlay.active {
      display: flex;
    }

    .session-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.5rem;
      flex: 1;
      padding: 1.5rem;
      height: 100%;
    }

    .session-video-area {
      position: relative;
      background: var(--panel);
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px solid var(--yoga-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-strong);
    }

    #yoga-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #yoga-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    #ghost-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .session-hud {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
      pointer-events: none;
    }

    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-pose-name {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--yoga-primary);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      font-family: "Fraunces", serif;
    }

    .hud-accuracy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .accuracy-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--yoga-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      position: relative;
      background: var(--panel);
      box-shadow: var(--shadow-pill);
    }

    .accuracy-circle.high {
      border-color: var(--yoga-primary);
      background: rgba(228, 127, 99, 0.1);
      box-shadow: 0 0 20px rgba(228, 127, 99, 0.2);
    }

    .accuracy-label {
      font-size: 0.8rem;
      color: var(--yoga-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-feedback {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      right: 2rem;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid var(--yoga-tertiary);
      border-radius: var(--radius-sm);
      padding: 1rem;
      font-size: 1.1rem;
      color: var(--text);
      text-align: center;
      animation: slideUp 0.3s ease;
      box-shadow: var(--shadow-soft);
    }

    .hud-feedback.success {
      border-color: var(--yoga-primary);
      background: rgba(228, 127, 99, 0.1);
    }

    .hud-feedback.warning {
      border-color: var(--yoga-tertiary);
      background: rgba(233, 180, 120, 0.1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* SIDE PANEL */
    .session-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      max-height: calc(100vh - 100px);
      box-shadow: var(--shadow-soft-md);
    }

    .panel-section {
      border-bottom: 1px solid var(--panel-soft-border);
      padding-bottom: 1rem;
    }

    .panel-section:last-child {
      border-bottom: none;
    }

    .panel-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--yoga-secondary);
      margin-bottom: 0.5rem;
    }

    .panel-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--yoga-primary);
      font-family: "Fraunces", serif;
    }

    .instruction-list {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0 0 0;
    }

    .instruction-item {
      padding: 0.5rem 0;
      font-size: 0.9rem;
      color: var(--muted);
      position: relative;
      padding-left: 1rem;
      transition: all 0.2s ease;
    }

    .instruction-item::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--yoga-secondary);
    }

    .instruction-item.active {
      color: var(--yoga-primary);
      background: rgba(228, 127, 99, 0.08);
      padding: 0.5rem;
      border-radius: 6px;
      padding-left: 1rem;
    }

    .timer-display {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: var(--yoga-primary);
      margin: 0.5rem 0;
      font-family: "Fraunces", serif;
    }

    .progress-ring {
      width: 80px;
      height: 80px;
      margin: 1rem auto;
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.35s;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      stroke: var(--yoga-primary);
      fill: transparent;
      stroke-width: 4;
      stroke-dasharray: 251.2;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: auto;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--yoga-primary), var(--yoga-secondary));
      border: none;
      color: #fff;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-pill);
    }

    .btn-secondary {
      background: var(--ghost-bg);
      border: 2px solid var(--yoga-secondary);
      color: var(--yoga-secondary);
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    .btn-secondary:hover {
      border-color: var(--yoga-primary);
      color: var(--yoga-primary);
      background: rgba(228, 127, 99, 0.1);
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .session-layout {
        grid-template-columns: 1fr;
      }

      .session-panel {
        max-height: 250px;
      }
    }

    @media (max-width: 768px) {
      .yoga-header {
        flex-direction: column;
        gap: 1rem;
      }

      .yoga-container {
        padding: 1rem;
      }

      .accuracy-circle {
        width: 80px;
        height: 80px;
        font-size: 1.5rem;
      }

      .hud-pose-name {
        font-size: 1.3rem;
      }

      .session-layout {
        gap: 0.5rem;
        padding: 0.5rem;
      }
    }
  </style>
  <script src="node_modules/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="node_modules/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="node_modules/@mediapipe/pose/pose.js"></script>
</head>
<body data-theme="light">
  <div id="yoga-bg" class="neural-bg"></div>
  <div class="yoga-app">
    <header class="yoga-header">
      <div class="yoga-brand">
        🧘 MAITRI Yoga AI
      </div>
      <div class="yoga-nav">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span id="status-text">Initializing...</span>
        </div>
        <button class="btn-secondary" id="toggle-theme" title="Toggle dark mode">Light mode</button>
        <button class="btn-secondary" onclick="window.location.href='index.html'">Back</button>
      </div>
    </header>

    <main class="yoga-container" id="main-content">
      <div id="pose-selection" style="display: block;">
        <h1 style="color: var(--yoga-primary); text-align: center; margin-bottom: 2rem; font-size: 2.5rem; font-family: 'Fraunces', serif;">
          AI-Powered Yoga Training
        </h1>
        <p style="text-align: center; color: var(--yoga-secondary); margin-bottom: 3rem; font-size: 1.1rem; font-family: 'Manrope', sans-serif;">
          Select a pose and let the AI guide you. Real-time posture correction powered by MediaPipe.
        </p>

        <div class="pose-categories" id="pose-grid"></div>
      </div>
    </main>
  </div>

  <!-- SESSION OVERLAY -->
  <div class="yoga-session-overlay" id="session-overlay">
    <div style="flex: 1; padding: 1rem; display: flex;">
      <div class="session-layout">
        <div class="session-video-area">
          <video id="yoga-video" autoplay playsinline muted></video>
          <canvas id="yoga-canvas"></canvas>
          <canvas id="ghost-canvas"></canvas>
          <div class="session-hud">
            <div class="hud-top">
              <div class="hud-pose-name" id="hud-pose-name">Mountain Pose</div>
              <div class="hud-accuracy">
                <div class="accuracy-circle" id="accuracy-circle">
                  <span id="accuracy-percent">0%</span>
                </div>
                <div class="accuracy-label">Match</div>
              </div>
            </div>
          </div>
          <div class="hud-feedback" id="hud-feedback" style="display: none;"></div>
        </div>

        <div class="session-panel">
          <div class="panel-section">
            <div class="panel-label">Current Step</div>
            <div class="panel-title" id="step-title">Step 1</div>
            <p id="step-description" style="font-size: 0.9rem; color: var(--neon-secondary); margin-top: 0.5rem;"></p>
          </div>

          <div class="panel-section">
            <div class="panel-label">Instructions</div>
            <ol class="instruction-list" id="instruction-list"></ol>
          </div>

          <div class="panel-section">
            <div class="panel-label">Hold Progress</div>
            <div class="timer-display" id="timer-display">0s</div>
            <svg class="progress-ring" viewBox="0 0 100 100">
              <circle class="progress-ring-circle" stroke-dashoffset="0" r="40" cx="50" cy="50" />
            </svg>
          </div>

          <div class="button-group">
            <button class="btn-primary" id="next-step-btn" onclick="yogaSession.nextStep()">Next Step</button>
            <button class="btn-secondary" onclick="yogaSession.endSession()">End Session</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/flow-field-background.js"></script>
  <script type="module" src="js/yoga.js"></script>
  
  <script>
    // Initialize neural background when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      const yogaBg = document.getElementById('yoga-bg');
      if (yogaBg && typeof NeuralBackground !== 'undefined') {
        // Use orange for animation in both light and dark modes
        new NeuralBackground(yogaBg, {
          color: '#ff8c42',
          trailColor: '#000000',
          trailOpacity: 0.4,
          particleCount: 50,
          speed: 2
        });
      }
    });
  </script>
</body>
</html>
